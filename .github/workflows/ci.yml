name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    environment: ci-peter
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      CF_TOKEN: ${{ secrets.CF_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_ACCESS_ID: ${{ secrets.CF_ACCESS_ID }}
      CF_ACCESS_SEC: ${{ secrets.CF_ACCESS_SEC }}
      CF_S3: ${{ secrets.CF_S3 }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENCODE_GO_KEY: ${{ secrets.OPENCODE_GO_KEY }}
      OPENCODE_ZEN_KEY: ${{ secrets.OPENCODE_ZEN_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: peterlodri-sec/proposal.vaked.dev
          path: proposal-site
          token: ${{ secrets.CF_TOKEN || github.token }}
        if: github.ref == 'refs/heads/main'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/ --ignore-missing-imports

      - name: Test (pytest + coverage)
        run: uv run pytest --cov=src/ultrawhale --cov-report=xml --cov-report=term-missing

      - name: Verify package build
        run: uv build

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest'
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Deploy proposal site (CF Pages)
        if: github.ref == 'refs/heads/main' && env.CF_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy proposal-site --project-name=proposal-vaked-dev --branch=main
