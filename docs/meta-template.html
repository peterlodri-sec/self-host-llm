<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ============================================================
       META TAG REFERENCE — copy-paste into any project
       Source: https://proposal.vaked.dev (canonical example)
       ============================================================ -->

  <!-- ── BASICS ────────────────────────────────────────────────── -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Project Name — tagline</title>
  <meta name="theme-color" content="#080c14">
  <meta name="description" content="Short, punchy description of what this is. 150–160 chars.">
  <meta name="author" content="Your Name or Org">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://your-domain.com/">

  <!-- ── OPEN GRAPH (Facebook, LinkedIn, Discord, Slack) ───────── -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Your Project Name — tagline">
  <meta property="og:description" content="Same as description or a hook. 150–160 chars.">
  <meta property="og:url" content="https://your-domain.com/">
  <meta property="og:site_name" content="your-domain.com">
  <meta property="og:image" content="https://your-domain.com/favicon.svg">
  <meta property="og:image:width" content="200">
  <meta property="og:image:height" content="200">

  <!-- ── TWITTER CARD ──────────────────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Your Project Name — tagline">
  <meta name="twitter:description" content="Tighter version of description for tweet-sized spaces.">
  <meta name="twitter:image" content="https://your-domain.com/favicon.svg">

  <!-- ── FAVICON ───────────────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">

  <!-- ── PWA (optional) ────────────────────────────────────────── -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-title" content="Project">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- ── FONTS ─────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- ── STYLES (CDN or compiled) ──────────────────────────────── -->
  <link href="index.css" rel="stylesheet">

  <!-- ── JSON-LD STRUCTURED DATA (Google Rich Results) ─────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Your Project Name",
    "url": "https://your-domain.com/",
    "description": "Short description.",
    "author": {
      "@type": "Person",
      "name": "Your Name"
    }
  }
  </script>
</head>
<body>
  <!-- Your content here -->
</body>
</html>
