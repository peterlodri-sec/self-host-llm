<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f1f3a"/>
    </linearGradient>
    <linearGradient id="whale" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="ring3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="200" height="200" rx="28" fill="url(#ocean)"/>

  <!-- Data rings (orbit paths) -->
  <ellipse cx="100" cy="100" rx="82" ry="28" fill="none" stroke="url(#ring1)" stroke-width="2" stroke-dasharray="6,8" opacity="0.6" transform="rotate(-15, 100, 100)"/>
  <ellipse cx="100" cy="100" rx="72" ry="22" fill="none" stroke="url(#ring2)" stroke-width="1.5" stroke-dasharray="4,10" opacity="0.5" transform="rotate(10, 100, 100)"/>
  <ellipse cx="100" cy="100" rx="62" ry="18" fill="none" stroke="url(#ring3)" stroke-width="1" stroke-dasharray="3,12" opacity="0.4" transform="rotate(-5, 100, 100)"/>

  <!-- Whale body -->
  <g transform="translate(100, 105)">
    <!-- Main body -->
    <path d="M-45,0 
             C-45,-8 -38,-18 -25,-22 
             C-10,-26 10,-26 28,-20 
             C40,-16 48,-8 50,0
             C52,8 48,14 38,16
             C28,18 10,18 -5,16
             C-20,14 -35,12 -42,8
             C-50,4 -52,-2 -45,0Z"
          fill="url(#whale)" opacity="0.95"/>

    <!-- Tail -->
    <path d="M-42,2 
             C-55,-4 -65,-18 -68,-22
             C-70,-26 -64,-20 -58,-12
             C-52,-4 -46,2 -42,2Z"
          fill="url(#whale)" opacity="0.9"/>
    <path d="M-42,2 
             C-55,8 -62,20 -64,24
             C-66,28 -60,22 -56,16
             C-50,10 -46,4 -42,2Z"
          fill="url(#whale)" opacity="0.9"/>

    <!-- Dorsal fin -->
    <path d="M8,-22 C12,-30 18,-34 22,-28 C26,-22 20,-20 14,-20Z"
          fill="#0d9488" opacity="0.8"/>

    <!-- Eye -->
    <circle cx="28" cy="-6" r="3.5" fill="#0a1628"/>
    <circle cx="29" cy="-7" r="1.5" fill="white" opacity="0.8"/>

    <!-- Mouth line -->
    <path d="M34,4 C38,2 42,0 44,1" fill="none" stroke="#0a1628" stroke-width="1" opacity="0.3"/>

    <!-- Water spout -->
    <path d="M-2,-22 C-4,-32 -8,-38 -6,-42" fill="none" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M2,-22 C4,-34 8,-40 10,-44" fill="none" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M6,-22 C10,-30 16,-36 18,-38" fill="none" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

    <!-- Data node dots along body -->
    <circle cx="-18" cy="-10" r="1.5" fill="#67e8f9" opacity="0.7"/>
    <circle cx="-6" cy="-14" r="1.5" fill="#67e8f9" opacity="0.5"/>
    <circle cx="6" cy="-14" r="1.5" fill="#67e8f9" opacity="0.6"/>
    <circle cx="18" cy="-10" r="1.5" fill="#67e8f9" opacity="0.4"/>
  </g>
</svg>
